<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClipForge - Download de Vídeos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0A0A0B; color: #fff; font-family: system-ui; padding: 16px; }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { text-align: center; margin: 20px 0; font-size: 28px; }
        .purple { color: #8B5CF6; }
        
        .card { background: #121214; border: 1px solid #1F1F23; border-radius: 16px; padding: 20px; margin-bottom: 16px; }
        .input { width: 100%; background: #0A0A0B; border: 1px solid #1F1F23; border-radius: 12px; padding: 14px; color: #fff; font-size: 16px; margin-bottom: 12px; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-primary { background: #8B5CF6; color: #fff; }
        .btn-success { background: #10B981; color: #fff; }
        .btn-secondary { background: #374151; color: #fff; }
        
        .progress-bar { width: 100%; height: 6px; background: #1F1F23; border-radius: 3px; margin: 12px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: #8B5CF6; width: 0%; transition: width 0.3s; }
        
        .video-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: #0A0A0B; border-radius: 12px; margin-bottom: 8px; }
        .video-item span { font-size: 14px; }
        
        .hidden { display: none; }
        .text-center { text-align: center; }
        .text-sm { font-size: 14px; }
        .text-gray { color: #9CA3AF; }
        .mb-4 { margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <h1><span class="purple">Clip</span>Forge</h1>
        <p class="text-center text-gray text-sm mb-4">Download de vídeos sem marca d'água</p>
        
        <!-- Download -->
        <div class="card">
            <input type="text" id="videoUrl" class="input" placeholder="Cole o link do TikTok, Instagram ou YouTube">
            <button onclick="downloadVideo()" class="btn btn-primary" id="downloadBtn">
                ⬇️ Baixar Vídeo
            </button>
            
            <div id="progressArea" class="hidden">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p class="text-sm text-gray" id="progressText">Baixando...</p>
            </div>
            
            <div id="resultArea" class="hidden">
                <p class="text-sm mb-4" style="color: #10B981;">✅ Download concluído!</p>
                <button onclick="saveVideo()" class="btn btn-success">💾 Salvar na galeria</button>
            </div>
        </div>
        
        <!-- Vídeos baixados -->
        <div class="card">
            <h2 class="mb-4">📂 Vídeos baixados</h2>
            <div id="videosList">
                <p class="text-gray text-center text-sm">Carregando...</p>
            </div>
            <button onclick="loadVideos()" class="btn btn-secondary mt-4">🔄 Atualizar lista</button>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000/api';
        let ultimoVideo = null;

        async function downloadVideo() {
            const url = document.getElementById('videoUrl').value.trim();
            
            if (!url) {
                alert('Cole o link do vídeo!');
                return;
            }
            
            // Mostrar progresso
            document.getElementById('progressArea').classList.remove('hidden');
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('downloadBtn').disabled = true;
            document.getElementById('downloadBtn').textContent = '⏳ Baixando...';
            
            // Simular progresso
            let progress = 0;
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            
            const interval = setInterval(() => {
                progress += Math.random() * 10;
                if (progress > 90) {
                    progress = 90;
                    clearInterval(interval);
                }
                progressFill.style.width = progress + '%';
                progressText.textContent = 'Baixando... ' + Math.round(progress) + '%';
            }, 500);
            
            try {
                const response = await fetch(API + '/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                
                const data = await response.json();
                
                clearInterval(interval);
                progressFill.style.width = '100%';
                
                if (data.success) {
                    progressText.textContent = '✅ Concluído!';
                    ultimoVideo = data.filename;
                    document.getElementById('resultArea').classList.remove('hidden');
                    loadVideos();
                    
                    // Baixar automaticamente
                    setTimeout(() => saveVideo(), 1000);
                } else {
                    progressText.textContent = '❌ Erro: ' + (data.error || 'Falha no download');
                }
            } catch (error) {
                clearInterval(interval);
                progressText.textContent = '❌ Erro de conexão. O servidor está rodando?';
                console.error(error);
            }
            
            document.getElementById('downloadBtn').disabled = false;
            document.getElementById('downloadBtn').textContent = '⬇️ Baixar Vídeo';
        }

        function saveVideo() {
            if (ultimoVideo) {
                window.open(API + '/video/' + ultimoVideo, '_blank');
            }
        }

        async function loadVideos() {
            try {
                const response = await fetch(API + '/videos');
                const data = await response.json();
                
                const list = document.getElementById('videosList');
                
                if (!data.videos || data.videos.length === 0) {
                    list.innerHTML = '<p class="text-gray text-center text-sm">Nenhum vídeo baixado ainda</p>';
                    return;
                }
                
                list.innerHTML = data.videos.map(v => `
                    <div class="video-item">
                        <span>${v.filename}</span>
                        <button onclick="window.open('${API}/video/${v.filename}', '_blank')" 
                                class="btn btn-success" style="width: auto; padding: 8px 16px; font-size: 12px;">
                            Baixar
                        </button>
                    </div>
                `).join('');
                
            } catch (error) {
                document.getElementById('videosList').innerHTML = 
                    '<p class="text-gray text-center text-sm">Erro ao carregar. Servidor offline?</p>';
            }
        }

        loadVideos();
    </script>
</body>
</html>
